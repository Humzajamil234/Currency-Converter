<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Ultimate Professional Currency Converter with Real-time Rates">
    <meta name="theme-color" content="#0A0C12">
    <title>ProCurrency | Enterprise Converter</title>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C12;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Premium Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, rgba(0, 200, 255, 0.05), transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(0, 100, 255, 0.04), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(16px, 4vw, 24px);
            position: relative;
            z-index: 1;
        }

        /* Header - Mobile Responsive */
        .header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: clamp(24px, 5vw, 32px);
            animation: fadeInDown 0.6s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo h1 {
            font-size: clamp(20px, 5vw, 24px);
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: clamp(10px, 3vw, 12px);
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        .live-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00e676;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .live-text {
            font-size: clamp(10px, 3vw, 12px);
            font-weight: 500;
            color: #00e676;
        }

        .update-time {
            font-size: clamp(9px, 2.5vw, 11px);
            color: rgba(255,255,255,0.35);
        }

        /* Grid Layout - Responsive */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: clamp(20px, 4vw, 28px);
        }

        /* Cards with Animation */
        .card {
            background: rgba(18, 22, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: clamp(20px, 5vw, 28px);
            padding: clamp(20px, 5vw, 28px);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: fadeInUp 0.6s ease backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-title {
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Amount Input - Mobile Optimized */
        .amount-wrapper {
            margin-bottom: 24px;
        }

        .amount-label {
            font-size: clamp(11px, 3vw, 12px);
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            display: block;
        }

        .amount-input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .amount-input {
            flex: 1;
            padding: clamp(14px, 4vw, 18px) clamp(16px, 4vw, 20px);
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 600;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            color: white;
            font-family: monospace;
            transition: all 0.3s ease;
        }

        .amount-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            transform: scale(1.01);
        }

        .quick-actions {
            display: flex;
            gap: 8px;
        }

        .quick-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: clamp(6px, 2vw, 8px) clamp(10px, 3vw, 12px);
            border-radius: 12px;
            color: rgba(255,255,255,0.6);
            font-size: clamp(10px, 3vw, 11px);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quick-btn:active {
            transform: scale(0.95);
        }

        .quick-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        /* Currency Row - Mobile Responsive */
        .currency-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: clamp(10px, 3vw, 16px);
            align-items: center;
            margin-bottom: 24px;
        }

        @media (max-width: 480px) {
            .currency-row {
                gap: 8px;
            }
        }

        .currency-card {
            background: rgba(0,0,0,0.3);
            border-radius: clamp(16px, 4vw, 20px);
            padding: clamp(12px, 3vw, 16px);
        }

        .currency-label {
            font-size: clamp(9px, 2.5vw, 10px);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
        }

        .currency-select {
            width: 100%;
            padding: clamp(10px, 3vw, 12px);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: white;
            font-size: clamp(12px, 3.5vw, 14px);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .currency-select:hover {
            border-color: #00d4ff;
        }

        .swap-btn {
            width: clamp(40px, 10vw, 48px);
            height: clamp(40px, 10vw, 48px);
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: clamp(18px, 5vw, 20px);
        }

        .swap-btn:active {
            transform: rotate(180deg) scale(0.95);
        }

        .swap-btn:hover {
            background: #00d4ff;
            transform: rotate(180deg);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        /* Result Box with Bounce Animation */
        .result-box {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 100, 255, 0.05));
            border-radius: clamp(20px, 5vw, 24px);
            padding: clamp(20px, 5vw, 28px);
            text-align: center;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        .bounce-animation {
            animation: bounce 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .converted-amount {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .exchange-rate {
            font-size: clamp(11px, 3vw, 13px);
            color: rgba(255,255,255,0.45);
            margin-top: 8px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn {
            padding: clamp(8px, 2.5vw, 10px) clamp(16px, 4vw, 20px);
            border-radius: 40px;
            font-size: clamp(11px, 3vw, 13px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            color: white;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(0, 212, 255, 0);
            }
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
            animation: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
        }

        .btn-outline:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
        }

        /* Section Titles */
        .section-title {
            font-size: clamp(11px, 3vw, 12px);
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Popular Grid - Responsive */
        .popular-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
            margin-bottom: 24px;
        }

        @media (max-width: 400px) {
            .popular-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .popular-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            font-size: clamp(10px, 3vw, 12px);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .popular-item:active {
            transform: scale(0.96);
        }

        .popular-item:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: #00d4ff;
            transform: translateY(-2px);
        }

        /* Favorites - Responsive */
        .favorites-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .favorite-badge {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: clamp(10px, 3vw, 11px);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .favorite-badge:active {
            transform: scale(0.96);
        }

        .remove-fav {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 14px;
        }

        /* Chart Tabs */
        .chart-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .chart-tab {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: rgba(255,255,255,0.6);
            font-size: clamp(11px, 3vw, 12px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chart-tab.active {
            background: #00d4ff;
            color: #0A0C12;
        }

        .chart-container {
            position: relative;
            height: clamp(220px, 40vw, 260px);
        }

        /* Compare Grid - Responsive */
        .compare-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
        }

        .compare-item {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 10px;
            text-align: center;
        }

        .compare-currency {
            font-size: clamp(10px, 3vw, 12px);
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }

        .compare-amount {
            font-size: clamp(12px, 3.5vw, 14px);
            font-weight: 700;
            color: #00d4ff;
        }

        /* Alert Section */
        .alert-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .alert-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .alert-input {
            flex: 1;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: white;
            font-size: 13px;
        }

        /* History List */
        .history-list {
            max-height: 280px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: slideInLeft 0.4s ease backwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-value {
            font-size: clamp(11px, 3vw, 13px);
            font-weight: 500;
        }

        .history-time {
            font-size: clamp(9px, 2.5vw, 10px);
            color: rgba(255,255,255,0.35);
            margin-top: 4px;
        }

        .history-delete {
            background: rgba(255, 70, 70, 0.15);
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: #ff6b6b;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-delete:active {
            transform: scale(0.95);
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1f2e;
            border: 1px solid #00d4ff;
            padding: 12px 20px;
            border-radius: 48px;
            color: #00d4ff;
            font-size: clamp(11px, 3vw, 13px);
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2s forwards;
            z-index: 1000;
            max-width: calc(100vw - 40px);
            text-align: center;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: clamp(9px, 2.5vw, 11px);
            color: rgba(255,255,255,0.25);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }

        /* Touch Optimizations */
        @media (max-width: 768px) {
            button, .popular-item, .favorite-badge, .swap-btn, .quick-btn {
                cursor: default;
            }
            
            .amount-input {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>💱 ProCurrency</h1>
            <p>Enterprise Grade • Real-time Rates</p>
        </div>
        <div class="live-status">
            <div class="live-dot"></div>
            <span class="live-text">LIVE</span>
            <span class="update-time" id="updateTime">Updating...</span>
        </div>
    </div>

    <div class="main-grid">
        <!-- Left Column - Main Converter -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span>💰</span> Currency Converter
                </div>
            </div>

            <!-- Amount Input -->
            <div class="amount-wrapper">
                <div class="amount-label">Enter Amount</div>
                <div class="amount-input-group">
                    <input type="number" id="amount" class="amount-input" placeholder="0.00" value="1">
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="quickAmount(0.5)">½</button>
                        <button class="quick-btn" onclick="quickAmount(2)">2×</button>
                        <button class="quick-btn" onclick="roundAmount()">Round</button>
                    </div>
                </div>
            </div>

            <!-- Currency Selectors -->
            <div class="currency-row">
                <div class="currency-card">
                    <div class="currency-label">From</div>
                    <select id="fromCurrency" class="currency-select">
                        <option value="USD">🇺🇸 USD</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="GBP">🇬🇧 GBP</option>
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="PKR" selected>🇵🇰 PKR</option>
                        <option value="INR">🇮🇳 INR</option>
                        <option value="AED">🇦🇪 AED</option>
                        <option value="SAR">🇸🇦 SAR</option>
                        <option value="CAD">🇨🇦 CAD</option>
                        <option value="AUD">🇦🇺 AUD</option>
                        <option value="CNY">🇨🇳 CNY</option>
                        <option value="TRY">🇹🇷 TRY</option>
                        <option value="RUB">🇷🇺 RUB</option>
                        <option value="BRL">🇧🇷 BRL</option>
                        <option value="ZAR">🇿🇦 ZAR</option>
                        <option value="CHF">🇨🇭 CHF</option>
                        <option value="NZD">🇳🇿 NZD</option>
                        <option value="SGD">🇸🇬 SGD</option>
                        <option value="MYR">🇲🇾 MYR</option>
                        <option value="THB">🇹🇭 THB</option>
                    </select>
                </div>

                <div class="swap-btn" id="swapBtn">🔄</div>

                <div class="currency-card">
                    <div class="currency-label">To</div>
                    <select id="toCurrency" class="currency-select">
                        <option value="USD" selected>🇺🇸 USD</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="GBP">🇬🇧 GBP</option>
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="PKR">🇵🇰 PKR</option>
                        <option value="INR">🇮🇳 INR</option>
                        <option value="AED">🇦🇪 AED</option>
                        <option value="SAR">🇸🇦 SAR</option>
                        <option value="CAD">🇨🇦 CAD</option>
                        <option value="AUD">🇦🇺 AUD</option>
                        <option value="CNY">🇨🇳 CNY</option>
                        <option value="TRY">🇹🇷 TRY</option>
                        <option value="RUB">🇷🇺 RUB</option>
                        <option value="BRL">🇧🇷 BRL</option>
                        <option value="ZAR">🇿🇦 ZAR</option>
                        <option value="CHF">🇨🇭 CHF</option>
                        <option value="NZD">🇳🇿 NZD</option>
                        <option value="SGD">🇸🇬 SGD</option>
                        <option value="MYR">🇲🇾 MYR</option>
                        <option value="THB">🇹🇭 THB</option>
                    </select>
                </div>
            </div>

            <!-- Result -->
            <div class="result-box">
                <div class="converted-amount" id="convertedAmount">0.00</div>
                <div class="exchange-rate" id="exchangeRate">Loading rates...</div>
            </div>

            <!-- Action Buttons -->
            <div class="btn-group">
                <button class="btn btn-primary" id="convertBtn">Convert</button>
                <button class="btn btn-outline" id="saveHistoryBtn">Save</button>
                <button class="btn btn-outline" id="addFavoriteBtn">⭐ Favorite</button>
            </div>

            <!-- Favorites Section -->
            <div class="section-title">⭐ Favorite Pairs</div>
            <div class="favorites-list" id="favoritesList">
                <div style="color: rgba(255,255,255,0.3); font-size: 12px;">No favorites yet</div>
            </div>

            <!-- Popular Conversions -->
            <div class="section-title">🔥 Popular</div>
            <div class="popular-grid" id="popularGrid"></div>

            <!-- Compare Section -->
            <div class="section-title">📊 Compare</div>
            <div class="compare-grid" id="compareGrid"></div>

            <!-- Rate Alert -->
            <div class="alert-section">
                <div class="section-title">🔔 Rate Alert</div>
                <div class="alert-input-group">
                    <input type="number" id="alertRate" class="alert-input" placeholder="Target rate">
                    <button class="btn btn-outline" id="setAlertBtn" style="padding: 10px 16px;">Set</button>
                </div>
            </div>
        </div>

        <!-- Right Column - Chart & History -->
        <div style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Chart Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>📈</span> Trend
                    </div>
                    <div class="chart-tabs">
                        <button class="chart-tab active" data-days="7">7D</button>
                        <button class="chart-tab" data-days="30">30D</button>
                        <button class="chart-tab" data-days="90">90D</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="rateChart"></canvas>
                </div>
            </div>

            <!-- History Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>📜</span> History
                    </div>
                    <button class="btn btn-outline" id="clearHistoryBtn" style="padding: 6px 14px; font-size: 11px;">Clear</button>
                </div>
                <div class="history-list" id="historyList">
                    <div style="text-align: center; color: rgba(255,255,255,0.3); padding: 40px;">No history yet</div>
                </div>
                <button class="btn btn-outline" id="exportHistoryBtn" style="margin-top: 16px; width: 100%;">📥 Export CSV</button>
            </div>
        </div>
    </div>

    <div class="footer-note">
        Real-time rates • Updated every 5 minutes
    </div>
</div>

<script>
    let exchangeRates = {};
    let lastUpdateTime = null;
    let isUsingAPI = true;
    let rateChart = null;
    let currentChartDays = 7;
    let conversionHistory = JSON.parse(localStorage.getItem('conversionHistory')) || [];
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let alertTarget = localStorage.getItem('alertTarget') ? parseFloat(localStorage.getItem('alertTarget')) : null;

    const popularPairs = [
        { from: "USD", to: "PKR", label: "USD→PKR" },
        { from: "PKR", to: "USD", label: "PKR→USD" },
        { from: "EUR", to: "PKR", label: "EUR→PKR" },
        { from: "GBP", to: "PKR", label: "GBP→PKR" },
        { from: "USD", to: "INR", label: "USD→INR" },
        { from: "AED", to: "PKR", label: "AED→PKR" },
        { from: "SAR", to: "PKR", label: "SAR→PKR" },
        { from: "USD", to: "EUR", label: "USD→EUR" }
    ];

    const compareCurrencies = ["EUR", "GBP", "INR"];

    const fallbackRates = {
        USD: 1, EUR: 0.92, GBP: 0.79, JPY: 151.5, PKR: 278.5, INR: 83.2,
        AED: 3.67, SAR: 3.75, CAD: 1.36, AUD: 1.52, CNY: 7.24, TRY: 32.1,
        RUB: 92.5, BRL: 5.12, ZAR: 18.8, CHF: 0.91, NZD: 1.65, SGD: 1.35,
        MYR: 4.72, THB: 36.5
    };

    async function fetchExchangeRates() {
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await response.json();
            if (data && data.rates) {
                exchangeRates = data.rates;
                isUsingAPI = true;
                lastUpdateTime = new Date();
                updateLastUpdated();
                showNotification("Live rates loaded");
                checkRateAlert();
                return true;
            }
        } catch (error) {
            exchangeRates = fallbackRates;
            isUsingAPI = false;
            lastUpdateTime = new Date();
            updateLastUpdated();
            showNotification("Using offline rates");
            return false;
        }
    }

    function updateLastUpdated() {
        if (lastUpdateTime) {
            document.getElementById('updateTime').innerHTML = lastUpdateTime.toLocaleTimeString();
        }
    }

    function showNotification(msg, isError = false) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.style.borderColor = isError ? '#ff6b6b' : '#00d4ff';
        notif.style.color = isError ? '#ff6b6b' : '#00d4ff';
        notif.innerHTML = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }

    function checkRateAlert() {
        if (alertTarget) {
            const fromCurr = document.getElementById('fromCurrency').value;
            const toCurr = document.getElementById('toCurrency').value;
            const currentRate = exchangeRates[toCurr] / exchangeRates[fromCurr];
            if (Math.abs(currentRate - alertTarget) <= alertTarget * 0.01) {
                showNotification(`🎯 Alert! Rate reached ${currentRate.toFixed(4)}`);
                localStorage.removeItem('alertTarget');
                alertTarget = null;
            }
        }
    }

    function quickAmount(multiplier) {
        let amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount)) amount = 1;
        document.getElementById('amount').value = amount * multiplier;
        convertCurrency();
    }

    function roundAmount() {
        let amount = parseFloat(document.getElementById('amount').value);
        if (isNaN(amount)) amount = 1;
        document.getElementById('amount').value = Math.round(amount);
        convertCurrency();
    }

    function animateNumber(element, start, end, duration = 600) {
        const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            const current = start + (end - start) * ease;
            element.innerHTML = `${current.toFixed(2)} ${document.getElementById('toCurrency').value}`;
            if (progress < 1) requestAnimationFrame(update);
            else {
                element.innerHTML = `${end.toFixed(2)} ${document.getElementById('toCurrency').value}`;
                element.classList.add('bounce-animation');
                setTimeout(() => element.classList.remove('bounce-animation'), 500);
            }
        }
        requestAnimationFrame(update);
    }

    async function convertCurrency(saveToHistory = false) {
        const amount = parseFloat(document.getElementById('amount').value);
        const fromCurrency = document.getElementById('fromCurrency').value;
        const toCurrency = document.getElementById('toCurrency').value;

        if (isNaN(amount) || amount <= 0) {
            showNotification("Enter valid amount", true);
            return null;
        }

        if (Object.keys(exchangeRates).length === 0) await fetchExchangeRates();

        let convertedAmount, rate;
        if (fromCurrency === 'USD') {
            rate = exchangeRates[toCurrency];
            convertedAmount = amount * rate;
        } else if (toCurrency === 'USD') {
            rate = 1 / exchangeRates[fromCurrency];
            convertedAmount = amount / exchangeRates[fromCurrency];
        } else {
            const inUSD = amount / exchangeRates[fromCurrency];
            rate = exchangeRates[toCurrency];
            convertedAmount = inUSD * rate;
        }

        const formattedRate = rate.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 6 });
        document.getElementById('exchangeRate').innerHTML = `1 ${fromCurrency} = ${formattedRate} ${toCurrency}`;

        const currentDisplay = document.getElementById('convertedAmount');
        const currentValue = parseFloat(currentDisplay.innerHTML.split(' ')[0]) || 0;
        animateNumber(currentDisplay, currentValue, convertedAmount);

        updateCompareSection(amount, fromCurrency);

        if (saveToHistory) {
            conversionHistory.unshift({
                id: Date.now(),
                amount,
                from: fromCurrency,
                to: toCurrency,
                result: convertedAmount,
                rate: rate,
                time: new Date().toLocaleString()
            });
            if (conversionHistory.length > 30) conversionHistory.pop();
            localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
            renderHistory();
            showNotification("Saved to history");
        }
        return { rate, convertedAmount };
    }

    function updateCompareSection(amount, baseCurrency) {
        const compareGrid = document.getElementById('compareGrid');
        if (!compareGrid) return;
        compareGrid.innerHTML = '';
        compareCurrencies.forEach(curr => {
            const rate = exchangeRates[curr] / exchangeRates[baseCurrency];
            const converted = amount * rate;
            const div = document.createElement('div');
            div.className = 'compare-item';
            div.innerHTML = `
                <div class="compare-currency">${curr}</div>
                <div class="compare-amount">${converted.toFixed(2)}</div>
            `;
            compareGrid.appendChild(div);
        });
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (!container) return;
        if (conversionHistory.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.3); padding: 40px;">No history yet</div>';
            return;
        }
        container.innerHTML = '';
        conversionHistory.slice(0, 15).forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.style.animationDelay = `${idx * 0.05}s`;
            div.innerHTML = `
                <div>
                    <div class="history-value">${item.amount} ${item.from} → ${item.result.toFixed(2)} ${item.to}</div>
                    <div class="history-time">${item.time}</div>
                </div>
                <button class="history-delete" onclick="deleteHistoryItem(${item.id})">Delete</button>
            `;
            container.appendChild(div);
        });
    }

    function deleteHistoryItem(id) {
        conversionHistory = conversionHistory.filter(item => item.id !== id);
        localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
        renderHistory();
        showNotification("Deleted");
    }

    function clearHistory() {
        conversionHistory = [];
        localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
        renderHistory();
        showNotification("History cleared");
    }

    function exportHistory() {
        if (conversionHistory.length === 0) {
            showNotification("No history to export", true);
            return;
        }
        let csv = "Amount,From,To,Result,Time\n";
        conversionHistory.forEach(item => {
            csv += `${item.amount},${item.from},${item.to},${item.result.toFixed(4)},${item.time}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `currency_history_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showNotification("History exported");
    }

    function addFavorite() {
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const pair = `${from}/${to}`;
        if (!favorites.includes(pair)) {
            favorites.push(pair);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderFavorites();
            showNotification(`Added ${pair}`);
        } else {
            showNotification("Already in favorites", true);
        }
    }

    function removeFavorite(pair) {
        favorites = favorites.filter(f => f !== pair);
        localStorage.setItem('favorites', JSON.stringify(favorites));
        renderFavorites();
        showNotification("Removed");
    }

    function renderFavorites() {
        const container = document.getElementById('favoritesList');
        if (!container) return;
        if (favorites.length === 0) {
            container.innerHTML = '<div style="color: rgba(255,255,255,0.3); font-size: 12px;">No favorites yet</div>';
            return;
        }
        container.innerHTML = '';
        favorites.forEach(pair => {
            const [from, to] = pair.split('/');
            const div = document.createElement('div');
            div.className = 'favorite-badge';
            div.innerHTML = `
                ${from}→${to}
                <button class="remove-fav" onclick="event.stopPropagation(); removeFavorite('${pair}')">✕</button>
            `;
            div.onclick = () => {
                document.getElementById('fromCurrency').value = from;
                document.getElementById('toCurrency').value = to;
                convertCurrency();
                updateChart();
            };
            container.appendChild(div);
        });
    }

    function swapCurrencies() {
        const from = document.getElementById('fromCurrency');
        const to = document.getElementById('toCurrency');
        [from.value, to.value] = [to.value, from.value];
        convertCurrency();
        updateChart();
        showNotification("Swapped");
    }

    function setPopular(from, to) {
        document.getElementById('fromCurrency').value = from;
        document.getElementById('toCurrency').value = to;
        convertCurrency();
        updateChart();
    }

    function createPopularButtons() {
        const grid = document.getElementById('popularGrid');
        if (!grid) return;
        grid.innerHTML = '';
        popularPairs.forEach(pair => {
            const btn = document.createElement('div');
            btn.className = 'popular-item';
            btn.innerHTML = pair.label;
            btn.onclick = () => setPopular(pair.from, pair.to);
            grid.appendChild(btn);
        });
    }

    function setRateAlert() {
        const rate = parseFloat(document.getElementById('alertRate').value);
        if (isNaN(rate) || rate <= 0) {
            showNotification("Enter valid rate", true);
            return;
        }
        alertTarget = rate;
        localStorage.setItem('alertTarget', alertTarget);
        showNotification(`Alert set for ${rate}`);
        document.getElementById('alertRate').value = '';
    }

    async function updateChart() {
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const baseRate = (exchangeRates[to] / exchangeRates[from]) || 1;
        
        const rates = [];
        const days = currentChartDays;
        for (let i = days; i >= 0; i--) {
            const variation = 1 + (Math.random() - 0.5) * 0.03;
            rates.push(baseRate * variation);
        }
        
        const dates = [];
        for (let i = days; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
        }
        
        if (rateChart) rateChart.destroy();
        const ctx = document.getElementById('rateChart').getContext('2d');
        rateChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: `${from}/${to}`,
                    data: rates,
                    borderColor: '#00d4ff',
                    backgroundColor: 'rgba(0, 212, 255, 0.05)',
                    borderWidth: 2.5,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#00d4ff',
                    pointBorderColor: '#0A0C12',
                    pointRadius: 3,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { labels: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } } },
                    tooltip: { backgroundColor: '#1a1f2e', titleColor: '#00d4ff', bodyColor: '#fff' }
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                    x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } } }
                }
            }
        });
    }

    // Event Listeners
    document.getElementById('amount')?.addEventListener('input', () => convertCurrency());
    document.getElementById('fromCurrency')?.addEventListener('change', () => { convertCurrency(); updateChart(); });
    document.getElementById('toCurrency')?.addEventListener('change', () => { convertCurrency(); updateChart(); });
    document.getElementById('convertBtn')?.addEventListener('click', () => convertCurrency());
    document.getElementById('saveHistoryBtn')?.addEventListener('click', () => convertCurrency(true));
    document.getElementById('swapBtn')?.addEventListener('click', swapCurrencies);
    document.getElementById('clearHistoryBtn')?.addEventListener('click', clearHistory);
    document.getElementById('exportHistoryBtn')?.addEventListener('click', exportHistory);
    document.getElementById('addFavoriteBtn')?.addEventListener('click', addFavorite);
    document.getElementById('setAlertBtn')?.addEventListener('click', setRateAlert);

    document.querySelectorAll('.chart-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentChartDays = parseInt(tab.dataset.days);
            updateChart();
        });
    });

    async function init() {
        createPopularButtons();
        await fetchExchangeRates();
        await convertCurrency();
        renderHistory();
        renderFavorites();
        await updateChart();
        setInterval(async () => {
            await fetchExchangeRates();
            await convertCurrency();
            await updateChart();
        }, 300000);
    }
    init();
</script>
</body>
</html>
