<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Enterprise Grade Currency Converter with Real-time Rates">
    <meta name="theme-color" content="#0D1117">
    <title>Currency Converter | Premium Edition</title>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0D1117;
            overflow-x: hidden;
            position: relative;
        }

        /* Premium Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, rgba(255, 215, 0, 0.08), transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(0, 100, 200, 0.06), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle Grid Pattern */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            color: #FFD700;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFD700 40%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header p {
            color: rgba(255, 255, 255, 0.4);
            margin-top: 12px;
            font-size: 14px;
            font-weight: 400;
        }

        /* Two Column Layout */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }

        @media (max-width: 900px) {
            .two-column {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .container {
                padding: 24px 20px;
            }
        }

        /* Cards */
        .card {
            background: rgba(18, 22, 28, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 32px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 24px;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Amount Input */
        .amount-input {
            width: 100%;
            padding: 20px;
            font-size: 36px;
            font-family: 'Plus Jakarta Sans', monospace;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            color: white;
            text-align: center;
            transition: all 0.2s ease;
        }

        .amount-input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .amount-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 10px;
            display: block;
            letter-spacing: 0.3px;
        }

        /* Currency Row */
        .currency-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: center;
            margin: 28px 0;
        }

        .currency-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
        }

        .currency-select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .currency-select:hover {
            border-color: #FFD700;
        }

        .swap-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
            margin: 0 auto;
        }

        .swap-btn:hover {
            background: #FFD700;
            transform: rotate(180deg);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* Result */
        .result-box {
            text-align: center;
            padding: 28px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            margin: 24px 0;
        }

        .converted-amount {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .exchange-rate {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #0D1117;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #FFD700;
        }

        .btn-danger {
            background: rgba(220, 53, 69, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        .btn-danger:hover {
            background: rgba(220, 53, 69, 0.25);
        }

        /* Popular Grid */
        .popular-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 16px;
        }

        @media (max-width: 500px) {
            .popular-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .popular-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s;
        }

        .popular-item:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #FFD700;
            color: #FFD700;
            transform: translateY(-2px);
        }

        /* Chart */
        .chart-container {
            position: relative;
            height: 260px;
            margin-top: 8px;
        }

        /* History */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-info {
            flex: 1;
        }

        .history-value {
            font-size: 14px;
            font-weight: 500;
            color: white;
        }

        .history-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
        }

        .history-delete {
            background: rgba(220, 53, 69, 0.2);
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: #ff6b6b;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-delete:hover {
            background: rgba(220, 53, 69, 0.4);
        }

        .empty-history {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            padding: 40px 20px;
            font-size: 13px;
        }

        .last-updated {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1f2e;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 12px 24px;
            border-radius: 48px;
            color: #FFD700;
            font-size: 13px;
            font-weight: 500;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2s forwards;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Currency Converter</h1>
        <p>Real-time exchange rates • Enterprise grade accuracy</p>
    </div>

    <div class="two-column">
        <!-- Left Column - Converter -->
        <div class="card">
            <div class="card-title">
                <span>💰</span> Amount
            </div>
            <input type="number" id="amount" class="amount-input" placeholder="0.00" value="1">

            <div class="currency-row">
                <div class="currency-box">
                    <div class="label">From</div>
                    <select id="fromCurrency" class="currency-select">
                        <option value="USD">🇺🇸 USD</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="GBP">🇬🇧 GBP</option>
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="PKR" selected>🇵🇰 PKR</option>
                        <option value="INR">🇮🇳 INR</option>
                        <option value="AED">🇦🇪 AED</option>
                        <option value="SAR">🇸🇦 SAR</option>
                        <option value="CAD">🇨🇦 CAD</option>
                        <option value="AUD">🇦🇺 AUD</option>
                        <option value="CNY">🇨🇳 CNY</option>
                        <option value="TRY">🇹🇷 TRY</option>
                        <option value="RUB">🇷🇺 RUB</option>
                        <option value="BRL">🇧🇷 BRL</option>
                        <option value="ZAR">🇿🇦 ZAR</option>
                        <option value="CHF">🇨🇭 CHF</option>
                        <option value="NZD">🇳🇿 NZD</option>
                        <option value="SGD">🇸🇬 SGD</option>
                        <option value="MYR">🇲🇾 MYR</option>
                        <option value="THB">🇹🇭 THB</option>
                    </select>
                </div>

                <div class="swap-btn" id="swapBtn">🔄</div>

                <div class="currency-box">
                    <div class="label">To</div>
                    <select id="toCurrency" class="currency-select">
                        <option value="USD" selected>🇺🇸 USD</option>
                        <option value="EUR">🇪🇺 EUR</option>
                        <option value="GBP">🇬🇧 GBP</option>
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="PKR">🇵🇰 PKR</option>
                        <option value="INR">🇮🇳 INR</option>
                        <option value="AED">🇦🇪 AED</option>
                        <option value="SAR">🇸🇦 SAR</option>
                        <option value="CAD">🇨🇦 CAD</option>
                        <option value="AUD">🇦🇺 AUD</option>
                        <option value="CNY">🇨🇳 CNY</option>
                        <option value="TRY">🇹🇷 TRY</option>
                        <option value="RUB">🇷🇺 RUB</option>
                        <option value="BRL">🇧🇷 BRL</option>
                        <option value="ZAR">🇿🇦 ZAR</option>
                        <option value="CHF">🇨🇭 CHF</option>
                        <option value="NZD">🇳🇿 NZD</option>
                        <option value="SGD">🇸🇬 SGD</option>
                        <option value="MYR">🇲🇾 MYR</option>
                        <option value="THB">🇹🇭 THB</option>
                    </select>
                </div>
            </div>

            <div class="result-box">
                <div class="converted-amount" id="convertedAmount">0.00</div>
                <div class="exchange-rate" id="exchangeRate">Loading rates...</div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="convertBtn">Convert</button>
                <button class="btn btn-secondary" id="saveHistoryBtn">Save</button>
                <button class="btn btn-secondary" id="resetBtn">Reset</button>
            </div>

            <div style="margin-top: 28px;">
                <div class="label">⭐ Popular conversions</div>
                <div class="popular-grid" id="popularGrid"></div>
            </div>

            <div class="last-updated" id="lastUpdated">Loading...</div>
        </div>

        <!-- Right Column - Chart & History -->
        <div style="display: flex; flex-direction: column; gap: 28px;">
            <div class="card">
                <div class="card-title">
                    <span>📈</span> 7-Day Trend
                </div>
                <div class="chart-container">
                    <canvas id="rateChart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-title" style="justify-content: space-between;">
                    <span>📜</span>
                    <button class="btn btn-secondary" id="clearHistoryBtn" style="padding: 5px 14px; font-size: 11px;">Clear all</button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="empty-history">No history yet</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let exchangeRates = {};
    let lastUpdateTime = null;
    let isUsingAPI = true;
    let rateChart = null;
    let conversionHistory = JSON.parse(localStorage.getItem('conversionHistory')) || [];

    const popularPairs = [
        { from: "USD", to: "PKR", label: "USD → PKR" },
        { from: "PKR", to: "USD", label: "PKR → USD" },
        { from: "EUR", to: "PKR", label: "EUR → PKR" },
        { from: "GBP", to: "PKR", label: "GBP → PKR" },
        { from: "USD", to: "INR", label: "USD → INR" },
        { from: "AED", to: "PKR", label: "AED → PKR" },
        { from: "SAR", to: "PKR", label: "SAR → PKR" },
        { from: "USD", to: "EUR", label: "USD → EUR" }
    ];

    const fallbackRates = {
        USD: 1, EUR: 0.92, GBP: 0.79, JPY: 151.5, PKR: 278.5, INR: 83.2,
        AED: 3.67, SAR: 3.75, CAD: 1.36, AUD: 1.52, CNY: 7.24, TRY: 32.1,
        RUB: 92.5, BRL: 5.12, ZAR: 18.8, CHF: 0.91, NZD: 1.65, SGD: 1.35,
        MYR: 4.72, THB: 36.5
    };

    async function fetchExchangeRates() {
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const data = await response.json();
            if (data && data.rates) {
                exchangeRates = data.rates;
                isUsingAPI = true;
                lastUpdateTime = new Date();
                updateLastUpdated();
                showNotification("Live rates loaded");
                return true;
            }
        } catch (error) {
            exchangeRates = fallbackRates;
            isUsingAPI = false;
            lastUpdateTime = new Date();
            updateLastUpdated();
            showNotification("Using offline rates");
            return false;
        }
    }

    function updateLastUpdated() {
        if (lastUpdateTime) {
            document.getElementById('lastUpdated').innerHTML = `Last updated: ${lastUpdateTime.toLocaleTimeString()} • ${isUsingAPI ? 'Live' : 'Cached'}`;
        }
    }

    function showNotification(msg) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.innerHTML = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }

    function animateNumber(element, start, end, duration = 600) {
        const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            const current = start + (end - start) * ease;
            element.innerHTML = `${current.toFixed(2)} ${document.getElementById('toCurrency').value}`;
            if (progress < 1) requestAnimationFrame(update);
            else element.innerHTML = `${end.toFixed(2)} ${document.getElementById('toCurrency').value}`;
        }
        requestAnimationFrame(update);
    }

    async function convertCurrency(saveToHistory = false) {
        const amount = parseFloat(document.getElementById('amount').value);
        const fromCurrency = document.getElementById('fromCurrency').value;
        const toCurrency = document.getElementById('toCurrency').value;

        if (isNaN(amount) || amount <= 0) {
            showNotification("Enter valid amount");
            return null;
        }

        if (Object.keys(exchangeRates).length === 0) await fetchExchangeRates();

        let convertedAmount, rate;
        if (fromCurrency === 'USD') {
            rate = exchangeRates[toCurrency];
            convertedAmount = amount * rate;
        } else if (toCurrency === 'USD') {
            rate = 1 / exchangeRates[fromCurrency];
            convertedAmount = amount / exchangeRates[fromCurrency];
        } else {
            const inUSD = amount / exchangeRates[fromCurrency];
            rate = exchangeRates[toCurrency];
            convertedAmount = inUSD * rate;
        }

        const formattedRate = rate.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 6 });
        document.getElementById('exchangeRate').innerHTML = `1 ${fromCurrency} = ${formattedRate} ${toCurrency}`;

        const currentDisplay = document.getElementById('convertedAmount');
        const currentValue = parseFloat(currentDisplay.innerHTML.split(' ')[0]) || 0;
        animateNumber(currentDisplay, currentValue, convertedAmount);

        if (saveToHistory) {
            conversionHistory.unshift({
                id: Date.now(),
                amount,
                from: fromCurrency,
                to: toCurrency,
                result: convertedAmount,
                time: new Date().toLocaleString()
            });
            if (conversionHistory.length > 20) conversionHistory.pop();
            localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
            renderHistory();
            showNotification("Saved to history");
        }
        return { rate, convertedAmount };
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (!container) return;
        if (conversionHistory.length === 0) {
            container.innerHTML = '<div class="empty-history">No history yet</div>';
            return;
        }
        container.innerHTML = '';
        conversionHistory.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="history-info">
                    <div class="history-value">${item.amount} ${item.from} → ${item.result.toFixed(2)} ${item.to}</div>
                    <div class="history-time">${item.time}</div>
                </div>
                <button class="history-delete" onclick="deleteHistoryItem(${item.id})">Delete</button>
            `;
            container.appendChild(div);
        });
    }

    function deleteHistoryItem(id) {
        conversionHistory = conversionHistory.filter(item => item.id !== id);
        localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
        renderHistory();
        showNotification("Deleted");
    }

    function clearHistory() {
        conversionHistory = [];
        localStorage.setItem('conversionHistory', JSON.stringify(conversionHistory));
        renderHistory();
        showNotification("History cleared");
    }

    function swapCurrencies() {
        const from = document.getElementById('fromCurrency');
        const to = document.getElementById('toCurrency');
        [from.value, to.value] = [to.value, from.value];
        convertCurrency();
        updateChart();
        showNotification("Swapped");
    }

    function resetConverter() {
        document.getElementById('amount').value = '1';
        document.getElementById('fromCurrency').value = 'PKR';
        document.getElementById('toCurrency').value = 'USD';
        convertCurrency();
        showNotification("Reset");
    }

    function setPopular(from, to) {
        document.getElementById('fromCurrency').value = from;
        document.getElementById('toCurrency').value = to;
        convertCurrency();
        updateChart();
    }

    function createPopularButtons() {
        const grid = document.getElementById('popularGrid');
        if (!grid) return;
        grid.innerHTML = '';
        popularPairs.forEach(pair => {
            const btn = document.createElement('div');
            btn.className = 'popular-item';
            btn.innerHTML = pair.label;
            btn.onclick = () => setPopular(pair.from, pair.to);
            grid.appendChild(btn);
        });
    }

    async function updateChart() {
        const from = document.getElementById('fromCurrency').value;
        const to = document.getElementById('toCurrency').value;
        const baseRate = (exchangeRates[to] / exchangeRates[from]) || 1;
        const rates = [];
        for (let i = 6; i >= 0; i--) {
            rates.push(baseRate * (1 + (Math.random() - 0.5) * 0.03));
        }
        const dates = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
        }
        if (rateChart) rateChart.destroy();
        const ctx = document.getElementById('rateChart').getContext('2d');
        rateChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: `${from}/${to}`,
                    data: rates,
                    borderColor: '#FFD700',
                    backgroundColor: 'rgba(255, 215, 0, 0.05)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#FFD700',
                    pointBorderColor: '#0D1117',
                    pointRadius: 3,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { labels: { color: 'rgba(255,255,255,0.6)', font: { size: 11 } } },
                    tooltip: { backgroundColor: '#1a1f2e', titleColor: '#FFD700', bodyColor: '#fff' }
                },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                    x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } } }
                }
            }
        });
    }

    // Event listeners
    document.getElementById('amount')?.addEventListener('input', () => convertCurrency());
    document.getElementById('fromCurrency')?.addEventListener('change', () => { convertCurrency(); updateChart(); });
    document.getElementById('toCurrency')?.addEventListener('change', () => { convertCurrency(); updateChart(); });
    document.getElementById('convertBtn')?.addEventListener('click', () => convertCurrency());
    document.getElementById('saveHistoryBtn')?.addEventListener('click', () => convertCurrency(true));
    document.getElementById('resetBtn')?.addEventListener('click', resetConverter);
    document.getElementById('swapBtn')?.addEventListener('click', swapCurrencies);
    document.getElementById('clearHistoryBtn')?.addEventListener('click', clearHistory);

    async function init() {
        createPopularButtons();
        await fetchExchangeRates();
        await convertCurrency();
        renderHistory();
        await updateChart();
        setInterval(async () => {
            await fetchExchangeRates();
            await convertCurrency();
            await updateChart();
        }, 300000);
    }
    init();
</script>
</body>
</html>
